<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 170" width="800" height="170">
  <style>
    @keyframes rev { from{clip-path:inset(0 100% 0 0)} to{clip-path:inset(0 0% 0 0)} }
    @keyframes fi  { from{opacity:0} to{opacity:1} }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    .logo { opacity:0; animation:fi 0.5s 0.1s forwards }
    .divider { opacity:0; animation:fi 0.3s 0.55s forwards }
    .n { clip-path:inset(0 100% 0 0); animation:rev 1.6s 0.7s cubic-bezier(0.4,0,0.2,1) both }
    .r { clip-path:inset(0 100% 0 0); animation:rev 1.0s 2.5s ease both }
    .s { clip-path:inset(0 100% 0 0); animation:rev 0.8s 3.7s ease both }
    .cur { animation:blink 0.45s 2.4s 3 forwards }
  </style>

  <rect width="800" height="170" fill="#f0f4f7"/>

  <g class="logo" transform="translate(37,47) scale(1.8)">
    <polygon points="0,0 10,0 24,28 14,28" fill="#09293D"/>
    <polygon points="4,0 10,0 24,28 18,28" fill="#0d3650" opacity="0.8"/>
    <polygon points="48,0 38,0 24,28 34,28" fill="#09293D"/>
    <polygon points="44,0 38,0 24,28 30,28" fill="#0d3650" opacity="0.8"/>
    <polygon points="14,28 34,28 24,42" fill="#3ab85a"/>
    <polygon points="20,28 28,28 24,36" fill="#63D779"/>
  </g>

  <rect class="divider" x="170" y="25" width="1.5" height="120" fill="#3ab85a" opacity="0.5"/>

  <text class="n" x="185" y="78"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="46" font-weight="700" fill="#09293D" letter-spacing="-0.5">Cristian Panza</text>

  <rect class="cur" x="534" y="41" width="3" height="40" fill="#3ab85a" rx="1"/>

  <text class="r" x="185" y="107"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="12" font-weight="500" fill="#1a7a3a" letter-spacing="4">AUDITOR  ·  BUILDER</text>

  <text class="s" x="185" y="128"
    font-family="'Courier New',Courier,monospace"
    font-size="11" fill="#4a6878">&#9658; Building Valuation Lab — DCF/WACC modeling platform</text>
</svg>
